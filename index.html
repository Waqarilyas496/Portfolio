```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Waqar Developer Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

html{
scroll-behavior:smooth;
font-family:Arial;
}

/* particles */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* hero */

.hero{
height:100vh;
display:flex;
align-items:center;
color:white;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* navbar */

.navbar{
background:rgba(0,0,0,.8);
}

/* profile */

.profile-img{
width:180px;
border-radius:50%;
border:4px solid white;
}

/* skill bars */

.skill-bar{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.skill-fill{
height:100%;
width:0%;
background:#0d6efd;
transition:2s;
}

/* project cards */

.project-card{
transition:.3s;
}

.project-card:hover{
transform:translateY(-10px);
}

/* chatbot */

.chat-btn{
position:fixed;
bottom:25px;
right:25px;
background:#0d6efd;
color:white;
border:none;
padding:15px;
border-radius:50%;
font-size:20px;
}

.chatbox{
position:fixed;
bottom:90px;
right:25px;
width:280px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
display:none;
flex-direction:column;
}

.chat-header{
background:#0d6efd;
color:white;
padding:10px;
}

.chat-body{
height:180px;
overflow:auto;
padding:10px;
font-size:14px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
border:none;
padding:8px;
}

.chat-input button{
border:none;
background:#0d6efd;
color:white;
padding:8px;
}

/* footer */

footer{
background:#111;
color:white;
padding:30px;
text-align:center;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<nav class="navbar navbar-dark fixed-top">

<div class="container">

<a class="navbar-brand fw-bold">Waqar Portfolio</a>

</div>

</nav>

<section class="hero">

<div class="container">

<div class="row align-items-center">

<div class="col-md-4 text-center">
<img src="Waqar1.jpeg" class="profile-img">
</div>

<div class="col-md-8">

<h1 class="display-4 fw-bold">Waqar Ilyas</h1>

<h3 class="typing"></h3>

<p class="lead">Future Full Stack Developer</p>

</div>

</div>

</div>

</section>

<section class="py-5">

<div class="container">

<h2 class="text-center mb-5">Skills</h2>

<div class="mb-4">

<p>HTML</p>

<div class="skill-bar">
<div class="skill-fill" data-width="90%"></div>
</div>

</div>

<div class="mb-4">

<p>CSS</p>

<div class="skill-bar">
<div class="skill-fill" data-width="85%"></div>
</div>

</div>

<div class="mb-4">

<p>JavaScript</p>

<div class="skill-bar">
<div class="skill-fill" data-width="75%"></div>
</div>

</div>

</div>

</section>

<section class="py-5 bg-light">

<div class="container">

<h2 class="text-center mb-5">GitHub Projects</h2>

<div class="row" id="projects"></div>

</div>

</section>

<section class="py-5">

<div class="container">

<h2 class="text-center mb-4">Contact</h2>

<div class="row justify-content-center">

<div class="col-md-6">

<form class="p-4 border rounded">

<input class="form-control mb-3" placeholder="Name">

<input class="form-control mb-3" placeholder="Email">

<textarea class="form-control mb-3" rows="4" placeholder="Message"></textarea>

<button class="btn btn-primary w-100">Send Message</button>

</form>

</div>

</div>

</div>

</section>

<footer>

<p>© 2026 Waqar Portfolio</p>

</footer>

<button class="chat-btn" onclick="toggleChat()">💬</button>

<div class="chatbox" id="chatbox">

<div class="chat-header">AI Assistant</div>

<div class="chat-body" id="chat-body"></div>

<div class="chat-input">

<input id="chat-text">

<button onclick="sendMsg()">Send</button>

</div>

</div>

<script>

/* typing */

new Typed(".typing",{
strings:["Web Developer","Programmer","Tech Enthusiast"],
typeSpeed:60,
backSpeed:40,
loop:true
})

/* particles */

particlesJS("particles-js",{
particles:{
number:{value:70},
size:{value:3},
move:{speed:2},
line_linked:{enable:true}
}
})

/* skill bars */

window.addEventListener("scroll",()=>{

document.querySelectorAll(".skill-fill").forEach(bar=>{
bar.style.width=bar.dataset.width
})

})

/* projects */

let projects=[

{name:"Ecommerce Website",desc:"Online store project"},
{name:"Student Portal",desc:"University dashboard"},
{name:"Portfolio Site",desc:"Personal portfolio"}

]

let container=document.getElementById("projects")

projects.forEach(p=>{

container.innerHTML+=`
<div class="col-md-4">
<div class="card project-card p-3">
<h5>${p.name}</h5>
<p>${p.desc}</p>
</div>
</div>
`

})

/* chatbot */

function toggleChat(){

let chat=document.getElementById("chatbox")

chat.style.display=chat.style.display=="flex"?"none":"flex"

}

function sendMsg(){

let input=document.getElementById("chat-text")
let body=document.getElementById("chat-body")

let msg=input.value

body.innerHTML+=`<div><b>You:</b> ${msg}</div>`

let reply="I am Waqar's AI assistant."

if(msg.toLowerCase().includes("hello")) reply="Hello 👋"
if(msg.toLowerCase().includes("skills")) reply="Waqar knows HTML, CSS, JS."

body.innerHTML+=`<div><b>Bot:</b> ${reply}</div>`

input.value=""

body.scrollTop=body.scrollHeight

}

</script>

</body>

</html>
